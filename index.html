<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>落子无悔！</title>
    <meta name="description" content="查看落子无悔百业的精彩瞬间与微信交流群。">

    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <!-- 使用现代字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-glow: rgba(212, 175, 55, 0.4);
            /* 暗金色发光 */
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            min-height: 100vh;
            width: 100%;
            max-width: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            /* 燕云十六声风格：水墨山水与暗黑幽静交叠的背景 */
            background-image: linear-gradient(to bottom, rgba(5, 5, 5, 0.6), rgba(8, 12, 12, 0.95)), url('assets/yanyun_bg.png');
            background-color: #030303;
            background-size: 110% 110%;
            background-position: center;
            background-attachment: fixed;
            animation: bgPan 40s ease-in-out infinite alternate;
        }

        @keyframes bgPan {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        /* 顶部装饰线 */
        .top-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.8), transparent);
            z-index: 10;
        }

        .container {
            display: flex;
            gap: 2rem;
            padding: 2rem;
            max-width: 1200px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
            perspective: 1000px;
        }

        /* 玻璃拟物态卡片 */
        .card {
            flex: 1 1 300px;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.5s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* 错开动画延迟 */
        .card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .card:nth-child(2) {
            animation-delay: 0.3s;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 卡片光晕效果 */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: skewX(-20deg);
            transition: left 0.7s ease;
        }

        .card:hover::before {
            left: 200%;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 40px var(--primary-glow);
        }

        /* 内部排版 */
        .card-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #d4af37, #fdf5e6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(212, 175, 55, 0.4));
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        /* QR 代码图像 */
        .qr-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 2rem;
            border-radius: 16px;
            padding: 8px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(0, 0, 0, 0.5));
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .qr-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s ease;
            cursor: zoom-in;
        }

        .qr-wrapper img:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
        }

        /* 优雅的按钮设计 */
        .btn {
            display: inline-block;
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            border: 1px solid rgba(212, 175, 55, 0.4);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            background: #d4af37;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .btn:hover {
            color: #000;
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .btn:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* 小号装饰文字 */
        .tag {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* 鼠标追踪光效容器 */
        #cursor-glow {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle closest-side, rgba(212, 175, 55, 0.08), transparent);
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: -1;
            transition: opacity 0.3s;
            opacity: 0;
        }

        /* 动态粒子绘制层 */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 顶部社主信息 */
        .header-profile {
            width: 100%;
            text-align: center;
            margin-bottom: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        .avatar-glow {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.4), rgba(0, 0, 0, 0.8));
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            margin-bottom: 1.2rem;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s ease;
        }

        .avatar-glow:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.5), 0 0 40px var(--primary-glow);
        }

        .avatar-glow img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .profile-info h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d4af37, #fdf5e6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .profile-info .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* 大图预览弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: zoom-out;
        }

        .modal img {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 40px var(--primary-glow);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: zoom-out;
            z-index: 1001;
        }

        .modal.active img {
            transform: scale(1);
        }

        /* 底部版权信息 */
        .footer {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            z-index: 10;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .container {
                padding: 1.5rem 1rem;
            }
            .card {
                padding: 2.5rem 1.5rem;
            }
            .header-profile {
                margin-top: 1.5rem;
                margin-bottom: 1.5rem;
            }
            h2 {
                font-size: 1.5rem;
            }
            .qr-wrapper {
                width: 160px;
                height: 160px;
            }
        }
    </style>
</head>

<body>
    <div class="top-glow"></div>
    <canvas id="particles-canvas"></canvas>
    <div id="cursor-glow"></div>

    <div class="header-profile">
        <div class="avatar-glow">
            <img src="assets/deng.png" alt="社主（玄天斩灵）头像">
        </div>
        <div class="profile-info">
            <h1>社主 · 玄天斩灵</h1>
            <div class="subtitle">落子无悔百业</div>
        </div>
    </div>

    <div class="container">
        <!-- 分区一：二维码 -->
        <div class="card" id="card-qr">
            <div class="tag">Community</div>
            <div class="card-icon">✦</div>
            <h2>加入交流群</h2>
            <p>扫码加入落子无悔百业群，<br>与同好探索江湖中更多精彩瞬间。</p>
            <div class="qr-wrapper">
                <img src="assets/vx-qr.png" alt="微信群二维码" id="qr-img">
            </div>
            <div style="font-size: 0.85rem; color: #666;"></div>
        </div>

        <!-- 分区二：相册链接 -->
        <div class="card" id="card-album">
            <div class="tag">Gallery</div>
            <div class="card-icon">✧</div>
            <h2>精彩瞬间相册</h2>
            <p>沉浸式体验游戏极致美学，<br>回顾我们共同记录的震撼时刻。</p>
            <!-- 占位以保持高度一致 -->
            <div style="height: 180px; display: flex; align-items: center; justify-content: center;">
                <a href="https://blackmyth.cn22.ug.link/photo/share/?id=8&pagetype=share&uuid=88615bee-c594-4cc1-8826-252ae7bbb4ae"
                    class="btn">进入相册探索</a>
            </div>
        </div>
    </div>

    <!-- 大图预览 Modal -->
    <div id="image-modal" class="modal">
        <div class="modal-backdrop"></div>
        <img id="modal-img" src="" alt="大图预览">
    </div>

    <div class="footer">
        &copy; 2026 CMontage. All rights reserved.
    </div>

    <script>
        // 实现优雅的 3D 倾斜和鼠标跟随系统 (Vanilla JS)
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.card');
            const glow = document.getElementById('cursor-glow');

            // 鼠标全局跟随光效
            window.addEventListener('mousemove', (e) => {
                glow.style.opacity = 1;
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';
            });

            window.addEventListener('mouseleave', () => {
                glow.style.opacity = 0;
            });

            // 卡片 3D 倾斜效果
            cards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left; // x position within the element
                    const y = e.clientY - rect.top;  // y position within the element

                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;

                    const rotateX = ((y - centerY) / centerY) * -5; // max 5 deg
                    const rotateY = ((x - centerX) / centerX) * 5;  // max 5 deg

                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px)`;
                });

                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) translateY(0)`;
                });
            });

            // --- 动态粒子系统 (余烬/尘埃飘动效果) ---
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5; // 余烬大小
                    this.speedX = Math.random() * 0.5 - 0.25;
                    this.speedY = Math.random() * -0.6 - 0.2; // 缓慢上升
                    this.opacity = Math.random() * 0.6 + 0.1;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.opacity > 0) {
                        this.opacity -= 0.001; // 缓慢熄灭
                    }
                    // 飞出屏幕或完全透明后，在底部重生
                    if (this.y < 0 || this.opacity <= 0) {
                        this.x = Math.random() * canvas.width;
                        this.y = canvas.height + 10;
                        this.opacity = Math.random() * 0.6 + 0.1;
                        this.speedX = Math.random() * 0.5 - 0.25;
                    }
                }
                draw() {
                    ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`; // 暗金萤火/余烬
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = "rgba(212, 175, 55, 0.8)";
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                // 控制粒子数量，保证性能和优雅感（不宜过多）
                for (let i = 0; i < 40; i++) {
                    particles.push(new Particle());
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                requestAnimationFrame(animateParticles);
            }

            initParticles();
            animateParticles();

            // 扫码大图预览逻辑
            const qrImg = document.getElementById('qr-img');
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-img');
            const modalBackdrop = document.querySelector('.modal-backdrop');

            if (qrImg && modal && modalImg) {
                qrImg.addEventListener('click', () => {
                    modalImg.src = qrImg.src;
                    modal.classList.add('active');
                });

                const closeModal = () => modal.classList.remove('active');
                modalBackdrop.addEventListener('click', closeModal);
                modalImg.addEventListener('click', closeModal);
            }
        });
    </script>
</body>

</html>
